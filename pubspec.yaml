name: ai_message_chat
description: "Messager - AI Chat App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0-130.0.dev

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  path_provider: ^2.1.5
  flutter_spinkit: ^5.2.2
  sqflite: ^2.4.2
  path: ^1.9.1
  google_generative_ai: ^0.4.6
  http: ^1.3.0
  intl: ^0.20.2
  uuid: ^4.5.1
  file_picker: ^8.3.7
  flutter_litert_lm: ^0.3.0
  speech_to_text: ^7.3.0
  record: ^6.2.0
  flutter_launcher_icons: ^0.14.3
  audioplayers: ^6.6.0
  flutter_tts: ^4.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo.png"
  adaptive_icon_background: "#0D1520"
  adaptive_icon_foreground: "assets/logo.png"
